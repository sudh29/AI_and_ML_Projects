name: study_note_agent

on:
  push:
    paths:
      - "study_note_agent/**"
      - ".github/workflows/study_note_agent.yml"
  pull_request:
    paths:
      - "study_note_agent/**"
      - ".github/workflows/study_note_agent.yml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: study_note_agent
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pytest
        run: uv run pytest
