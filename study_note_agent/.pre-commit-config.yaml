# Use this file so hooks only touch this project (see README).
# From repo root: pre-commit run --all-files --config study_note_agent/.pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^study_note_agent/
      - id: ruff-format
        files: ^study_note_agent/
